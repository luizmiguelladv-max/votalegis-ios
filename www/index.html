<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>VotaLegis</title>
  <style>
    html, body { margin: 0; height: 100%; background: #2563eb; color: #fff;
      font-family: -apple-system, system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center; text-align: center; }
    .box { padding: 24px; }
    h1 { font-size: 22px; font-weight: 800; margin: 0 0 8px; }
    p { opacity: .85; margin: 0; font-size: 14px; }
    .sp { width: 34px; height: 34px; margin: 0 auto 18px; border: 3px solid rgba(255,255,255,.35);
      border-top-color: #fff; border-radius: 50%; animation: r 1s linear infinite; }
    @keyframes r { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="sp"></div>
    <h1>VotaLegis</h1>
    <p>Conectando ao sistema…</p>
    <p style="margin-top:10px;font-size:12px;opacity:.7">Verifique sua conexão com a internet.</p>
  </div>
</body>
</html>
